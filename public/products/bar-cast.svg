<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <radialGradient id="bg" cx="35%" cy="25%" r="90%">
      <stop offset="0" stop-color="#1c1c21"/>
      <stop offset="1" stop-color="#0c0c0e"/>
    </radialGradient>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0d68f"/>
      <stop offset="0.45" stop-color="#c8a24a"/>
      <stop offset="1" stop-color="#8c6e29"/>
    </linearGradient>
    <linearGradient id="top" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fff4d6"/>
      <stop offset="0.5" stop-color="#e6c878"/>
      <stop offset="1" stop-color="#c8a24a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <ellipse cx="400" cy="470" rx="240" ry="34" fill="#000" opacity="0.45"/>
  <!-- top face -->
  <polygon points="250,250 560,250 600,210 290,210" fill="url(#top)"/>
  <!-- front face -->
  <polygon points="250,250 560,250 600,440 210,440" fill="url(#face)"/>
  <!-- right edge shade -->
  <polygon points="560,250 600,210 600,440" fill="#7a5f22" opacity="0.55"/>
  <!-- shine streak -->
  <polygon points="300,250 340,250 260,440 225,440" fill="#fff4d6" opacity="0.18"/>
  <!-- stamp -->
  <text x="405" y="320" font-family="Georgia, serif" font-size="34" font-weight="700" text-anchor="middle" fill="#5e4a1c">AURUM</text>
  <text x="405" y="360" font-family="system-ui, sans-serif" font-size="20" letter-spacing="2" text-anchor="middle" fill="#6b521f">FINE GOLD 999.9</text>
  <text x="405" y="398" font-family="system-ui, sans-serif" font-size="16" letter-spacing="3" text-anchor="middle" fill="#6b521f" opacity="0.8">SERIAL AU-0001</text>
</svg>
